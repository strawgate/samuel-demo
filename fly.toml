app = "piestore"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PUBLIC_BASE_URL = "https://piestore.fly.dev"
  MODEL = "gateway/google-vertex:gemini-2.5-flash"
  
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024
