services:
  db:
    image: postgres:16-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: piestore
      POSTGRES_PASSWORD: piestore
      POSTGRES_DB: piestore
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U piestore"]
      interval: 2s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports: ["8080:8080"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      MODEL: ${MODEL:-gateway/google-cloud:gemini-2.5-flash}
      PYDANTIC_AI_GATEWAY_API_KEY: ${PYDANTIC_AI_GATEWAY_API_KEY}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-demo-admin-token}
      DATABASE_URL: postgresql://piestore:piestore@db:5432/piestore
      PUBLIC_BASE_URL: http://localhost:8080

volumes:
  pgdata:
